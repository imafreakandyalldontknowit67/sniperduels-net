version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    groups:
      # Bundle non-breaking updates so we get one PR per week, not 30.
      patch-and-minor:
        update-types: [patch, minor]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
